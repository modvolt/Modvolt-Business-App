# ---------------------------------------------------------------------------
# Modvolt Knowledge - kořenový docker-compose (TENTO soubor čte Coolify)
#
# Coolify je nastaven: Build Pack = Docker Compose, Base Directory = /,
# Docker Compose Location = /docker-compose.yml. Proto MUSÍ být správný
# tento kořenový soubor (ne ten v modvolt-knowledge/, který Coolify nečte).
#
# Aplikace žije v podadresáři modvolt-knowledge/, proto build.context níže.
#
# DATABÁZE BĚŽÍ LOKÁLNĚ ve stejném compose stacku (služba "db", pgvector).
# DATABASE_URL a heslo jsou NAPEVNO — Coolify v compose módu neumí vnořenou
# interpolaci (${VAR} uprostřed řetězce). Databáze NEMÁ vystavený port ven,
# takže je dostupná jen zevnitř Docker sítě → pevné interní heslo je bezpečné.
#
# Ostatní tajné proměnné (SESSION_SECRET, S3_*, OPENAI_*, ADMIN_*) nastav
# v Coolify UI. POZOR: Coolify je do kontejneru NEvloží automaticky — musí
# být níže VÝSLOVNĚ předané jako KLIC: ${KLIC} (prosté předání funguje,
# vnořená interpolace ne). Proto je v "environment:" jejich úplný výčet.
# Když přidáš novou env proměnnou do aplikace, MUSÍŠ ji doplnit i sem.
#
# Migrace: aplikace si sama aplikuje čekající migrace při startu, před
# servírováním provozu (viz src/server/index.ts). Když selžou, kontejner
# spadne a nasazení selže hlasitě místo běhu proti zastaralému schématu.
#
# Lokální spuštění z kořene repa:  docker compose up -d
# ---------------------------------------------------------------------------
services:
  app:
    build:
      context: ./modvolt-knowledge
      dockerfile: Dockerfile
    restart: unless-stopped
    # Pro lokální `docker compose` lze využít .env v kořeni repozitáře.
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Interní lokální databáze (pgvector) ve stejném stacku.
      DATABASE_URL: "postgresql://postgres:modvolt_local_db@db:5432/modvolt"
      # --- Proměnné nastavené v Coolify UI (předané do kontejneru) ---
      SESSION_SECRET: ${SESSION_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      # S3 / Hetzner Object Storage
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # OpenAI – jeden klíč pro všechny modely (+ volitelný jiný endpoint)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-}
      # OpenAI – modely a chování (chat model = chat + klasifikace + vize)
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
      OPENAI_IMAGE_ANALYSIS_ENABLED: ${OPENAI_IMAGE_ANALYSIS_ENABLED:-}
      OPENAI_MAX_CONTEXT_CHUNKS: ${OPENAI_MAX_CONTEXT_CHUNKS:-}
      OPENAI_MAX_UPLOAD_MB: ${OPENAI_MAX_UPLOAD_MB:-}
      OPENAI_REQUEST_TIMEOUT_MS: ${OPENAI_REQUEST_TIMEOUT_MS:-}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-}
      OPENAI_EMBEDDING_BATCH_SIZE: ${OPENAI_EMBEDDING_BATCH_SIZE:-}
      # Fotografie
      MAX_IMAGE_UPLOAD_MB: ${MAX_IMAGE_UPLOAD_MB:-}
      STRIP_IMAGE_EXIF: ${STRIP_IMAGE_EXIF:-}
      # Hromadný import (manuální dávka s revizí)
      MAX_BATCH_FILES: ${MAX_BATCH_FILES:-}
      MAX_ZIP_MB: ${MAX_ZIP_MB:-}
      # Hromadný import na pozadí (pevné hodnoty – netřeba nastavovat v Coolify UI)
      BULK_MAX_FILE_MB: 200
      BULK_MAX_ARCHIVE_MB: 5120
      BULK_MAX_ARCHIVES: 20
      BULK_MAX_FILES: 20000
      # Web search (volitelné)
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-}
      WEB_SEARCH_PROVIDER: ${WEB_SEARCH_PROVIDER:-}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY:-}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS:-}
      WEB_SEARCH_TIMEOUT_MS: ${WEB_SEARCH_TIMEOUT_MS:-}
      # Admin bootstrap
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: modvolt_local_db
      POSTGRES_DB: modvolt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modvolt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
