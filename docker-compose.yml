# ---------------------------------------------------------------------------
# Modvolt Knowledge - kořenový docker-compose (TENTO soubor čte Coolify)
#
# Coolify je nastaven: Build Pack = Docker Compose, Base Directory = /,
# Docker Compose Location = /docker-compose.yml. Proto MUSÍ být správný
# tento kořenový soubor (ne ten v modvolt-knowledge/, který Coolify nečte).
#
# Aplikace žije v podadresáři modvolt-knowledge/, proto build.context níže.
#
# DATABÁZE BĚŽÍ LOKÁLNĚ ve stejném compose stacku (služba "db", pgvector).
# DATABASE_URL a heslo jsou NAPEVNO — Coolify v compose módu neumí vnořenou
# interpolaci (${VAR} uprostřed řetězce). Databáze NEMÁ vystavený port ven,
# takže je dostupná jen zevnitř Docker sítě → pevné interní heslo je bezpečné.
#
# Ostatní tajné proměnné (SESSION_SECRET, S3_*, OPENAI_*, ADMIN_*) nastav
# v Coolify UI — ty Coolify do služby "app" vloží automaticky.
#
# Migrace: aplikace si sama aplikuje čekající migrace při startu, před
# servírováním provozu (viz src/server/index.ts). Když selžou, kontejner
# spadne a nasazení selže hlasitě místo běhu proti zastaralému schématu.
#
# Lokální spuštění z kořene repa:  docker compose up -d
# ---------------------------------------------------------------------------
services:
  app:
    build:
      context: ./modvolt-knowledge
      dockerfile: Dockerfile
    restart: unless-stopped
    # Pro lokální `docker compose` lze využít .env v kořeni repozitáře.
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3000
      # Interní lokální databáze (pgvector) ve stejném stacku.
      DATABASE_URL: "postgresql://postgres:modvolt_local_db@db:5432/modvolt"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: modvolt_local_db
      POSTGRES_DB: modvolt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modvolt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
