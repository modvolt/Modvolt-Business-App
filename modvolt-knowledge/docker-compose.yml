# ---------------------------------------------------------------------------
# Modvolt Knowledge - docker-compose
#
# Migrace: aplikace si sama aplikuje čekající databázové migrace při startu,
# PŘED servírováním provozu (viz src/server/index.ts). Žádný samostatný
# migrační krok není potřeba; pokud migrace selžou, kontejner spadne a
# nasazení selže hlasitě místo běhu proti zastaralému schématu.
#
# Dvě varianty provozu:
#  1) Coolify s externí PostgreSQL službou:
#     - nech zakomentovanou službu "db" a nastav DATABASE_URL na externí databázi
#  2) Vlastní PostgreSQL + pgvector kontejner:
#     - odkomentuj službu "db" a profil "with-db"
#       spuštění: docker compose --profile with-db up -d
# ---------------------------------------------------------------------------
services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    # depends_on potřebné jen pro variantu s vlastní DB
    # depends_on:
    #   db:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Volitelná vlastní databáze s pgvector (profil "with-db") ---
  db:
    image: pgvector/pgvector:pg16
    profiles: ["with-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: modvolt
      POSTGRES_PASSWORD: modvolt
      POSTGRES_DB: modvolt_knowledge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modvolt -d modvolt_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
