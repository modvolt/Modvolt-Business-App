# ---------------------------------------------------------------------------
# Modvolt Knowledge - docker-compose (Coolify "Docker Compose" mód)
#
# DŮLEŽITÉ: Coolify v compose módu NEUMÍ vnořenou interpolaci proměnných
# (tj. ${VAR} uprostřed delšího řetězce). Proto je DATABASE_URL a heslo
# databáze napevno níže — NEpoužívá ${POSTGRES_PASSWORD}.
#
# Databáze běží lokálně ve stejném compose stacku a NEMÁ vystavený port
# (žádné ports:), takže je dostupná jen zevnitř Docker sítě. Pevné interní
# heslo je proto bezpečné — zvenčí se k DB nikdo nedostane.
#
# Tajné hodnoty aplikace (SESSION_SECRET, S3_*, OPENAI_*, ADMIN_*) nastav
# v Coolify UI jako environment variables. POZOR: musí být níže VÝSLOVNĚ
# předané jako KLIC: ${KLIC} (jednoduché předání funguje, vnořená interpolace
# ne). Když přidáš novou env proměnnou do aplikace, doplň ji i sem.
#
# Lokální vývoj:
#   docker compose up -d
# ---------------------------------------------------------------------------
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Interní lokální databáze (pgvector) ve stejném stacku.
      DATABASE_URL: "postgresql://postgres:modvolt_local_db@db:5432/modvolt"
      # --- Proměnné nastavené v Coolify UI (předané do kontejneru) ---
      SESSION_SECRET: ${SESSION_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      # S3 / Hetzner Object Storage
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # OpenAI – jeden klíč pro všechny modely (+ volitelný jiný endpoint)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-}
      # OpenAI – modely a chování (chat model = chat + klasifikace + vize)
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
      OPENAI_IMAGE_ANALYSIS_ENABLED: ${OPENAI_IMAGE_ANALYSIS_ENABLED:-}
      OPENAI_MAX_CONTEXT_CHUNKS: ${OPENAI_MAX_CONTEXT_CHUNKS:-}
      OPENAI_MAX_UPLOAD_MB: ${OPENAI_MAX_UPLOAD_MB:-}
      OPENAI_REQUEST_TIMEOUT_MS: ${OPENAI_REQUEST_TIMEOUT_MS:-}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-}
      OPENAI_EMBEDDING_BATCH_SIZE: ${OPENAI_EMBEDDING_BATCH_SIZE:-}
      # Fotografie
      MAX_IMAGE_UPLOAD_MB: ${MAX_IMAGE_UPLOAD_MB:-}
      STRIP_IMAGE_EXIF: ${STRIP_IMAGE_EXIF:-}
      # Hromadný import
      MAX_BATCH_FILES: ${MAX_BATCH_FILES:-}
      MAX_ZIP_MB: ${MAX_ZIP_MB:-}
      # Web search (volitelné)
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-}
      WEB_SEARCH_PROVIDER: ${WEB_SEARCH_PROVIDER:-}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY:-}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS:-}
      WEB_SEARCH_TIMEOUT_MS: ${WEB_SEARCH_TIMEOUT_MS:-}
      # Admin bootstrap
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: modvolt_local_db
      POSTGRES_DB: modvolt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modvolt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
