# ---------------------------------------------------------------------------
# Modvolt Knowledge - docker-compose (Coolify "Docker Compose" mód)
#
# DŮLEŽITÉ: Coolify v compose módu NEUMÍ vnořenou interpolaci proměnných
# (tj. ${VAR} uprostřed delšího řetězce). Proto je DATABASE_URL a heslo
# databáze napevno níže — NEpoužívá ${POSTGRES_PASSWORD}.
#
# Databáze běží lokálně ve stejném compose stacku a NEMÁ vystavený port
# (žádné ports:), takže je dostupná jen zevnitř Docker sítě. Pevné interní
# heslo je proto bezpečné — zvenčí se k DB nikdo nedostane.
#
# Tajné hodnoty aplikace (SESSION_SECRET, S3_*, OPENAI_*, ADMIN_*) nastav
# v Coolify UI jako environment variables — Coolify je do služby "app"
# vloží automaticky (jednoduché předání proměnné funguje).
#
# Lokální vývoj:
#   docker compose up -d
# ---------------------------------------------------------------------------
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      # Interní lokální databáze (pgvector) ve stejném stacku.
      DATABASE_URL: "postgresql://postgres:modvolt_local_db@db:5432/modvolt"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: modvolt_local_db
      POSTGRES_DB: modvolt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modvolt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
